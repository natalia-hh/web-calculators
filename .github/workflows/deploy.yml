name: Deploy web calculators to GitHub Pages

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Stop stale builds
        run: |
          latest_sha="$(git ls-remote origin refs/heads/main | awk '{ print $1 }')"
          if [ "$latest_sha" != "$GITHUB_SHA" ]; then
            echo "This workflow is for $GITHUB_SHA, but main is $latest_sha. Skipping stale build."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Stop stale deploys
        run: |
          latest_sha="$(git ls-remote origin refs/heads/main | awk '{ print $1 }')"
          if [ "$latest_sha" != "$GITHUB_SHA" ]; then
            echo "This workflow is for $GITHUB_SHA, but main is $latest_sha. Skipping stale deploy."
            exit 1
          fi

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          timeout: 1200000
